services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flask-app:
    build: ./flask-app
    environment:
      DB_HOST: db
      DB_NAME: guestbook
      DB_USER: user
      DB_PASSWORD: password
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app

volumes:
  postgres_data:
